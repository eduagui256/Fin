<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<title>Meu Dinheiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --indigo:#4F46E5;--indigo-hover:#4338CA;--indigo-soft:#EEF2FF;
  --bg:#F8F9FC;--card:#FFFFFF;
  --ink:#0F172A;--muted:#64748B;--faint:#CBD5E1;--track:#E2E8F0;
  --green:#10B981;--amber:#F59E0B;--orange:#F97316;--red:#EF4444;--red-deep:#991B1B;
  --shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-fab:0 4px 16px rgba(79,70,229,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}
body{padding-bottom:88px;max-width:760px;margin:0 auto;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;font-size:16px;}
.hidden{display:none!important;}

.topbar{padding:18px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.topbar h1{font-size:20px;font-weight:800;letter-spacing:-0.02em;}
.topbar .sub{font-size:13px;color:var(--muted);font-weight:500;}
.icon-btn{min-width:40px;height:40px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--indigo);padding:0 12px;gap:6px;}

.screen{padding:8px 16px 16px;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:12px;}
.card.tight{padding:16px;}
.card.tinted{background:#F1F5F9;}
.hero{background:linear-gradient(135deg,#4F46E5,#6366F1);border-radius:20px;padding:24px;color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(79,70,229,0.25);}
.hero .label{font-size:14px;font-weight:500;opacity:.9;}
.hero .big{font-size:44px;font-weight:800;letter-spacing:-0.03em;margin:4px 0 2px;line-height:1;}
.hero .sub{font-size:14px;opacity:.85;font-weight:500;}
.hero .divider{height:1px;background:rgba(255,255,255,.2);margin:16px 0;}
.hero-row{display:flex;justify-content:space-between;font-size:14px;}
.hero-row .v{font-weight:700;}

.row{display:flex;justify-content:space-between;align-items:center;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 4px 8px;}
.muted{color:var(--muted);}
.lbl{font-size:14px;color:var(--muted);font-weight:500;}
.val{font-size:20px;font-weight:700;letter-spacing:-0.01em;}
.val.green{color:var(--green);}.val.red{color:var(--red);}.val.amber{color:var(--amber);}.val.indigo{color:var(--indigo);}

.bar-wrap{margin-top:10px;}
.bar-track{height:8px;background:var(--track);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .5s ease,background-color .4s ease;width:0;}
.bar-meta{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;color:var(--muted);font-weight:500;}
.status-msg{font-size:13px;font-weight:600;margin-top:8px;}

.badge{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;letter-spacing:.01em;}
.badge.pend{background:#FEF3C7;color:#92400E;}
.badge.conf{background:#D1FAE5;color:#065F46;}
.badge.risk{background:#FEE2E2;color:#991B1B;}

/* litem base */
.litem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F1F5F9;}
.litem:last-child{border-bottom:none;}
.litem .left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
.litem .emoji{width:38px;height:38px;border-radius:10px;background:var(--indigo-soft);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.litem .name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.litem .meta{font-size:12px;color:var(--muted);margin-top:2px;}
.litem .right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:12px;}
.litem .amt{font-size:15px;font-weight:700;}

/* income item — layout redesenhado */
.inc-item{padding:14px 0;border-bottom:1px solid #F1F5F9;}
.inc-item:last-child{border-bottom:none;}
.inc-item .top{display:flex;justify-content:space-between;align-items:flex-start;}
.inc-item .info{flex:1;min-width:0;}
.inc-item .source{font-size:15px;font-weight:700;color:var(--ink);}
.inc-item .amount{font-size:18px;font-weight:800;color:var(--green);text-align:right;white-space:nowrap;}
.inc-item .bottom{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.inc-item .actions{display:flex;gap:6px;}
.inc-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;}
.inc-btn.confirm{background:var(--green);color:#fff;}
.inc-btn.edit{background:var(--indigo-soft);color:var(--indigo);}
.inc-btn.del{background:#F1F5F9;color:var(--muted);}

/* expense item */
.exp-item{padding:12px 0;border-bottom:1px solid #F1F5F9;cursor:pointer;}
.exp-item:last-child{border-bottom:none;}
.exp-item:active{opacity:.7;}
.exp-item .top{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.exp-item .ei{width:38px;height:38px;border-radius:10px;background:var(--indigo-soft);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.exp-item .ename{font-size:14px;font-weight:600;flex:1;}
.exp-item .eamt{font-size:15px;font-weight:700;color:var(--red);white-space:nowrap;}
.exp-item .edate{font-size:12px;color:var(--muted);margin-top:2px;}
.exp-item .edel{background:#F1F5F9;color:var(--muted);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;}

/* cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.cat-card{background:var(--card);border-radius:14px;padding:14px 14px 12px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;position:relative;}
.cat-card:active{transform:scale(.97);}
.cat-card .ce{font-size:20px;margin-bottom:4px;}
.cat-card .cn{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:2px;}
.cat-card .cv{font-size:17px;font-weight:800;color:var(--ink);}
/* seta elegante — triângulo SVG inline */
.cat-arrow{position:absolute;top:9px;right:9px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.cat-arrow svg{width:10px;height:10px;}
.cat-arrow.green{background:#D1FAE5;}.cat-arrow.green svg{fill:#065F46;}
.cat-arrow.yellow{background:#FEF3C7;}.cat-arrow.yellow svg{fill:#92400E;}
.cat-arrow.red{background:#FEE2E2;}.cat-arrow.red svg{fill:#991B1B;}
.cat-arrow.none{background:var(--track);}.cat-arrow.none svg{fill:var(--muted);}

/* metas laranja pastel */
.goal-card{background:#FFF4ED;border-radius:16px;padding:18px;margin-bottom:8px;border:1.5px solid #FDDCB5;}
.goal-card .gtitle{font-size:15px;font-weight:700;color:#7C3413;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.goal-card .gpct{font-size:14px;font-weight:700;color:#C2521A;}
.goal-card .bar-track{background:#FDDCB5;}
.goal-card .bar-fill{background:linear-gradient(90deg,#F97316,#FB923C);}
.goal-card .gfooter{font-size:13px;color:#92400E;margin-top:8px;font-weight:500;}

/* dívidas — vermelho suave */
.debt-card{background:#FFF5F5;border-radius:16px;padding:18px;margin-bottom:8px;border:1.5px solid #FCA5A5;}
.debt-card .dtitle{font-size:15px;font-weight:700;color:#7F1D1D;margin-bottom:2px;}
.debt-card .dmeta{font-size:12px;color:#991B1B;margin-bottom:10px;}
.debt-card .damt{font-size:20px;font-weight:800;color:#DC2626;}

/* alerta de fluxo */
.cashflow-alert{background:#FFF7ED;border:1.5px solid #FDE68A;border-radius:14px;padding:14px;margin-bottom:12px;}
.cashflow-alert .cfa-title{font-size:13px;font-weight:700;color:#92400E;margin-bottom:4px;}
.cashflow-alert .cfa-body{font-size:13px;color:#78350F;line-height:1.5;}

/* entrada em atraso */
.overdue-section{background:#FEF2F2;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1.5px solid #FCA5A5;}
.overdue-title{font-size:11px;font-weight:700;color:#991B1B;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}

.btn{background:var(--indigo);color:#fff;border-radius:12px;padding:15px 24px;font-size:15px;font-weight:700;width:100%;transition:.15s;}
.btn:active{transform:scale(.98);}
.btn.ghost{background:var(--indigo-soft);color:var(--indigo);}
.btn.outline{background:transparent;border:1.5px solid var(--track);color:var(--ink);}
.btn.danger{background:#FEE2E2;color:var(--red-deep);}
.btn.sm{padding:10px 16px;font-size:14px;width:auto;}
.btn-row{display:flex;gap:8px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.field input,.field select{width:100%;padding:14px;border:1.5px solid var(--track);border-radius:12px;background:var(--card);color:var(--ink);transition:.15s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--indigo);}
.big-input input{font-size:32px;font-weight:800;text-align:center;letter-spacing:-0.02em;padding:18px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:9px 14px;border-radius:999px;background:var(--bg);border:1.5px solid var(--track);font-size:14px;font-weight:600;transition:.15s;}
.chip.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}
.chip.mini{padding:7px 12px;font-size:13px;}

.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:ofade .2s;}
@keyframes ofade{from{opacity:0;}to{opacity:1;}}
.sheet{background:var(--bg);width:100%;max-width:760px;border-radius:24px 24px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.2,.8,.2,1);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.sheet-handle{width:40px;height:4px;background:var(--faint);border-radius:999px;margin:0 auto 16px;cursor:pointer;}
.sheet h2{font-size:20px;font-weight:800;margin-bottom:16px;letter-spacing:-0.02em;}

.fab{position:fixed;bottom:84px;right:20px;background:var(--indigo);color:#fff;border-radius:999px;padding:15px 22px;font-size:15px;font-weight:700;box-shadow:var(--shadow-fab);z-index:40;display:flex;align-items:center;gap:8px;}
.fab .plus{font-size:20px;line-height:1;}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:760px;background:var(--card);box-shadow:0 -1px 8px rgba(0,0,0,.05);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30;}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;color:var(--faint);font-size:11px;font-weight:600;flex:1;}
.nav button .ni{font-size:22px;}
.nav button.active{color:var(--indigo);}

.insight{display:flex;gap:12px;padding:14px;border-radius:14px;background:var(--indigo-soft);margin-bottom:8px;font-size:14px;line-height:1.5;font-weight:500;}
.insight .ic{font-size:18px;flex-shrink:0;}
.insight.warn{background:#FFF7ED;}.insight.danger{background:#FEF2F2;}

.verdict{text-align:center;padding:20px;border-radius:16px;margin-bottom:12px;}
.verdict .big{font-size:24px;font-weight:800;}
.verdict.safe{background:#D1FAE5;color:#065F46;}
.verdict.mod{background:#FEF3C7;color:#92400E;}
.verdict.risk{background:#FEE2E2;color:#991B1B;}
.simrow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F5F9;font-size:14px;}
.simrow .v{font-weight:700;}

.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;}
.empty .e{font-size:36px;display:block;margin-bottom:8px;}
.alert-stale{background:#FFF7ED;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;color:#92400E;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.comp-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #F1F5F9;}
.comp-row:last-child{border-bottom:none;}
.comp-row .left{display:flex;align-items:center;gap:12px;}
.comp-row .name{font-size:14px;font-weight:600;}
.comp-row .amt{font-size:15px;font-weight:700;}
.plan-highlight{background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid #C7D2FE;}

/* income tela sem FAB */
#screen-income .fab-hidden{display:none;}

@media(min-width:520px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:760px){.fab{right:calc(50% - 360px);}}
</style>
</head>
<body>

<div class="topbar">
  <div><h1 id="greeting">Meu Dinheiro</h1><div class="sub" id="todayDate"></div></div>
  <button class="icon-btn" onclick="openPlan()">📋 Planejamento</button>
</div>

<!-- DASHBOARD -->
<div class="screen" id="screen-dash">
  <div id="staleWrap"></div>
  <div id="cashflowAlert"></div>
  <div class="hero">
    <div class="label">Você pode gastar hoje</div>
    <div class="big" id="dailyAmount">R$ 0</div>
    <div class="sub" id="daysLeft"></div>
    <div class="divider"></div>
    <div class="hero-row"><span>Disponível até o fim do mês</span><span class="v" id="monthAvail">R$ 0</span></div>
  </div>
  <div class="card tight" id="compositionBox" style="margin-bottom:12px;"></div>
  <div id="goalsBlock"></div>
  <div class="section-title">Resumo do mês</div>
  <div class="card tight">
    <div class="litem"><div class="left"><div class="emoji">📥</div><div><div class="name">Recebido</div></div></div><div class="right"><div class="amt val green" id="sumIncome">R$ 0</div></div></div>
    <div class="litem"><div class="left"><div class="emoji">📤</div><div><div class="name">Gasto</div></div></div><div class="right"><div class="amt val red" id="sumExpense">R$ 0</div></div></div>
    <div class="litem" style="cursor:pointer;" onclick="openBills()"><div class="left"><div class="emoji">🏠</div><div><div class="name">Contas fixas</div></div></div><div class="right"><div class="amt val" id="sumBills">R$ 0</div><span style="color:var(--muted);font-size:16px;">›</span></div></div>
  </div>
  <div class="section-title">Gastos por categoria</div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="section-title">Insights</div>
  <div id="insights"></div>
  <div style="height:8px;"></div>
</div>

<!-- ENTRADAS — sem FAB -->
<div class="screen hidden" id="screen-income">
  <div class="btn-row" style="margin-bottom:16px;">
    <button class="btn" onclick="openIncome('now')">+ Recebi agora</button>
    <button class="btn ghost" onclick="openIncome('pending')">A receber</button>
  </div>
  <div id="incomeList"></div>
</div>

<!-- SIMULADOR -->
<div class="screen hidden" id="screen-sim">
  <div class="card">
    <div class="field big-input">
      <label>Quanto você quer gastar?</label>
      <input type="text" inputmode="decimal" id="simValue" placeholder="R$ 0" oninput="maskMoney(this)">
    </div>
    <div class="field">
      <label>Como pretende pagar?</label>
      <div class="chips">
        <button class="chip active" id="simAvista" onclick="setSimMode('avista')">À vista</button>
        <button class="chip" id="simParc" onclick="setSimMode('parc')">Parcelado</button>
      </div>
    </div>
    <div class="field hidden" id="simParcField">
      <label>Em quantas vezes?</label>
      <div class="chips" id="simParcChips"></div>
    </div>
    <button class="btn" onclick="runSim()">Simular</button>
  </div>
  <div id="simResult"></div>
</div>

<!-- GASTOS -->
<div class="screen hidden" id="screen-expenses">
  <div id="expenseListWrap"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openQuick()"><span class="plus">+</span> Gasto rápido</button>

<!-- NAV -->
<div class="nav">
  <button class="active" id="nav-dash" onclick="nav('dash')"><span class="ni">🏠</span>Início</button>
  <button id="nav-income" onclick="nav('income')"><span class="ni">📥</span>Entradas</button>
  <button id="nav-sim" onclick="nav('sim')"><span class="ni">🧮</span>Simular</button>
  <button id="nav-expenses" onclick="nav('expenses')"><span class="ni">📋</span>Gastos</button>
</div>

<div id="modalRoot"></div>

<script>
// ===== DADOS =====
const DEFAULT_CATS=[
  {id:'alim',n:'Alimentação',e:'🍽️'},{id:'mora',n:'Moradia',e:'🏠'},{id:'transp',n:'Transporte',e:'🚗'},
  {id:'saude',n:'Saúde',e:'💊'},{id:'lazer',n:'Lazer',e:'🎉'},{id:'estudo',n:'Estudos',e:'📚'},
  {id:'compras',n:'Compras',e:'🛍️'},{id:'assin',n:'Assinaturas',e:'📺'},{id:'outros',n:'Outros',e:'💸'}
];
function allCats(){return [...DEFAULT_CATS,...(S.customCats||[])];}

function touchBalance(amount){S.balance+=amount;S.balanceUpdatedAt=todayISO();}

function blank(){return{
  balance:0,balanceUpdatedAt:null,
  safetyMargin:300,monthlyEstimate:4000,
  expenses:[],incomes:[],bills:[],goals:[],debts:[],
  customCats:[],lastCats:[]
};}
let S=load();

function load(){try{const r=localStorage.getItem('meudinheiro_v3');return r?{...blank(),...JSON.parse(r)}:blank();}catch(e){return blank();}}
function save(){localStorage.setItem('meudinheiro_v3',JSON.stringify(S));render();}

// ===== HELPERS =====
function fmt(v){return'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:2});}
function fmtFull(v){return'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y.slice(2)}`;}
function parseMoney(s){if(!s)return 0;return parseFloat(String(s).replace(/[^\d,]/g,'').replace(',','.'))||0;}
function maskMoney(el){let v=el.value.replace(/\D/g,'');v=(parseInt(v)/100||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});el.value=v?'R$ '+v:'';}
function todayISO(){return new Date().toISOString().slice(0,10);}
function curMonth(){return new Date().toISOString().slice(0,7);}
function prevMonth(){const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);}
function daysLeftInMonth(){const n=new Date();const last=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();return last-n.getDate()+1;}
function daysSince(iso){if(!iso)return 999;return Math.floor((Date.now()-new Date(iso).getTime())/864e5);}
function catById(id){return allCats().find(c=>c.id===id)||{n:'Outros',e:'💸'};}
function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms);}

// ===== CÁLCULO =====
function monthExpenses(){return S.expenses.filter(e=>e.date.slice(0,7)===curMonth()&&!e.reconcile);}
function monthExpenseTotal(){return monthExpenses().reduce((a,e)=>a+e.amount,0);}
function billsTotal(){return S.bills.reduce((a,b)=>a+b.amount,0);}
function goalsMonthly(){return S.goals.reduce((a,g)=>a+(g.monthly||0),0);}
function debtsTotal(){return(S.debts||[]).reduce((a,d)=>a+(d.paid?0:d.amount),0);}
function pendingIncomesTotal(){return S.incomes.filter(i=>i.status==='pending').reduce((a,i)=>a+i.amount,0);}
function confirmedIncomesTotal(){return S.incomes.filter(i=>i.status==='confirmed'&&i.date.slice(0,7)===curMonth()).reduce((a,i)=>a+i.amount,0);}

// FÓRMULA CENTRAL
function availableThisMonth(){
  return S.balance + pendingIncomesTotal() - billsTotal() - goalsMonthly() - S.safetyMargin - debtsTotal();
}
function dailyAvailable(){return Math.max(0,availableThisMonth())/Math.max(1,daysLeftInMonth());}

// ALERTA DE FLUXO: o saldo atual dura até o próximo recebimento?
function cashFlowAlert(){
  const pending=S.incomes.filter(i=>i.status==='pending');
  if(!pending.length)return null;
  const daysPassed=new Date().getDate();
  const gastosDia=daysPassed>1?monthExpenseTotal()/(daysPassed-1):dailyAvailable();
  if(gastosDia<=0)return null;
  const diasSaldoAguentra=S.balance/gastosDia;
  // próximo recebimento em dias (usa data registrada)
  const hoje=new Date();
  let minDias=999;
  pending.forEach(i=>{
    const d=new Date(i.date+'T12:00:00');
    const diff=Math.ceil((d-hoje)/(864e5));
    if(diff>0&&diff<minDias)minDias=diff;
  });
  if(minDias===999)return null;
  if(diasSaldoAguentra<minDias){
    const deficit=(minDias-diasSaldoAguentra)*gastosDia;
    return{diasSaldo:Math.floor(diasSaldoAguentra),diasAteReceber:minDias,deficit};
  }
  return null;
}

// seta svg
const SVG_UP=`<svg viewBox="0 0 10 10"><polygon points="5,1 9,9 1,9"/></svg>`;
const SVG_DOWN=`<svg viewBox="0 0 10 10"><polygon points="5,9 9,1 1,1"/></svg>`;
const SVG_DASH=`<svg viewBox="0 0 10 10"><rect x="1" y="4" width="8" height="2"/></svg>`;

function catArrow(catId,curVal){
  const prev=S.expenses.filter(e=>!e.reconcile&&e.cat===catId&&e.date.slice(0,7)===prevMonth()).reduce((a,e)=>a+e.amount,0);
  if(prev===0)return{cls:'none',svg:SVG_DASH};
  const diff=(curVal-prev)/prev;
  if(diff<=0)return{cls:'green',svg:SVG_DOWN};
  if(diff<=0.2)return{cls:'yellow',svg:SVG_UP};
  return{cls:'red',svg:SVG_UP};
}
function renderCatGrid(){
  const exps=monthExpenses();
  const byCat={};exps.forEach(e=>byCat[e.cat]=(byCat[e.cat]||0)+e.amount);
  const used=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const grid=document.getElementById('catGrid');
  if(!used.length){grid.innerHTML=`<div class="card" style="grid-column:1/-1;"><div class="empty" style="padding:16px;"><span class="e">📊</span>Nenhum gasto este mês ainda</div></div>`;return;}
  grid.innerHTML=used.map(([id,val])=>{
    const cat=catById(id);const arrow=catArrow(id,val);
    return `<div class="cat-card" onclick="openCatDetail('${id}')"><div class="cat-arrow ${arrow.cls}">${arrow.svg}</div><div class="ce">${cat.e}</div><div class="cn">${cat.n}</div><div class="cv">${fmt(val)}</div></div>`;
  }).join('');
}

function renderInsights(){
  const box=document.getElementById('insights');const out=[];
  const daily=dailyAvailable();const spent=monthExpenseTotal();
  const daysPassed=new Date().getDate();const pace=daysPassed>0?spent/daysPassed:0;
  const pend=pendingIncomesTotal();
  if(availableThisMonth()<0)out.push({c:'danger',i:'🚨',t:'Seus compromissos do mês já passam do seu saldo disponível. Cuidado com novos gastos.'});
  if(pace>daily&&daily>0&&spent>0){const days=Math.ceil(Math.max(0,availableThisMonth())/Math.max(1,pace));out.push({c:'warn',i:'📈',t:`Seu ritmo de gasto está acima do ideal. Nesse ritmo, o orçamento pode apertar em ${days} dias.`});}
  if(pend>0)out.push({c:'',i:'💡',t:`${fmt(pend)} a receber já está incluído no disponível. Confirme quando cair para manter o saldo exato.`});
  if(daysSince(S.balanceUpdatedAt)>=7&&S.balanceUpdatedAt)out.push({c:'warn',i:'🔄',t:'Faz alguns dias que o saldo não é atualizado. Ajuste para manter os números precisos.'});
  if(daily>0&&daily<50)out.push({c:'warn',i:'🤏',t:'Seu espaço para gastar hoje está pequeno. Vale adiar gastos não essenciais.'});
  if((S.debts||[]).filter(d=>!d.paid).length>0)out.push({c:'warn',i:'💳',t:`Você tem dívidas registradas totalizando ${fmt(debtsTotal())}. Elas estão descontadas do seu disponível.`});
  const exps=monthExpenses();
  if(exps.length>0){const byCat={};exps.forEach(e=>byCat[e.cat]=(byCat[e.cat]||0)+e.amount);const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];out.push({c:'',i:catById(top[0]).e,t:`Maior gasto do mês: ${catById(top[0]).n} com ${fmt(top[1])}.`});}
  if(!out.length)out.push({c:'',i:'👍',t:'Tudo tranquilo. Continue registrando seus gastos.'});
  box.innerHTML=out.map(o=>`<div class="insight ${o.c}"><span class="ic">${o.i}</span><span>${o.t}</span></div>`).join('');
}

      <div class="row"><div><div class="dtitle">${d.name}</div><div class="dmeta">${d.creditor?'Para: '+d.creditor:''}</div></div>
      <button class="icon-btn" style="width:32px;height:32px;padding:0;font-size:14px;" onclick="delDebt('${d.id}')">🗑️</button></div>
      <div class="damt" style="margin:8px 0;">${fmt(d.amount)}</div>
      ${!d.paid?`<button class="btn sm" style="background:var(--green);color:#fff;width:100%;" onclick="payDebt('${d.id}')">✅ Marcar como paga</button>`:'<div class="badge conf" style="display:inline-block;">Paga</div>'}
    </div>`).join('')
    :'<div class="empty"><span class="e">💳</span>Nenhuma dívida registrada</div>';
  sheet(`<h2>Dívidas</h2>
    <div class="insight warn" style="margin-bottom:14px;"><span class="ic">💡</span><span>Dívidas são descontadas do seu disponível até serem marcadas como pagas.</span></div>
    ${list}
    <div class="card" style="margin-top:8px;">
      <div class="section-title" style="margin-top:0;">Registrar dívida</div>
      <div class="field"><label>Descrição</label><input type="text" id="dName" placeholder="Ex: Empréstimo amigo, Boleto atrasado"></div>
      <div class="field"><label>Para quem / Credor</label><input type="text" id="dCreditor" placeholder="Ex: João, Banco X (opcional)"></div>
      <div class="field"><label>Valor</label><input type="text" inputmode="decimal" id="dAmount" placeholder="R$ 0" oninput="maskMoney(this)"></div>
      <button class="btn" onclick="addDebt()">Registrar</button>
    </div>`);
}
function addDebt(){
  const name=document.getElementById('dName').value.trim();
  const amount=parseMoney(document.getElementById('dAmount').value);
  const creditor=document.getElementById('dCreditor').value.trim();
  if(!name||amount<=0){alert('Preencha descrição e valor');return;}
  if(!S.debts)S.debts=[];
  S.debts.push({id:Date.now()+'',name,amount,creditor,paid:false});
  vibrate(40);save();openDebts();
}
function payDebt(id){
  const d=(S.debts||[]).find(x=>x.id===id);
  if(!d)return;
  d.paid=true;
  vibrate(40);save();openDebts();
}
function delDebt(id){S.debts=(S.debts||[]).filter(d=>d.id!==id);save();openDebts();}

// ===== AJUSTAR SALDO =====
function openReconcile(){
  sheet(`<h2>Ajustar saldo</h2>
    <div class="insight" style="margin-bottom:14px;"><span class="ic">🏦</span><span>Abra o app do seu banco e informe o saldo atual. O app corrige qualquer diferença.</span></div>
    <div class="field big-input"><input type="text" inputmode="decimal" id="rBalance" placeholder="${fmt(S.balance)}" oninput="maskMoney(this)" autofocus></div>
    <button class="btn" onclick="saveReconcile()">Atualizar saldo</button>`);
  setTimeout(()=>{const el=document.getElementById('rBalance');if(el)el.focus();},150);
}
function saveReconcile(){
  const v=parseMoney(document.getElementById('rBalance').value);
  if(v<0||isNaN(v)){alert('Digite um valor válido');return;}
  const isPrimeiro=!S.balanceUpdatedAt;const diff=v-S.balance;
  S.balance=v;S.balanceUpdatedAt=todayISO();
  if(!isPrimeiro&&Math.abs(diff)>0.01)S.expenses.push({id:Date.now()+'',amount:Math.abs(diff),cat:'outros',pay:'outro',desc:'Ajuste de saldo',date:todayISO(),reconcile:true});
  vibrate(40);closeModal();save();
}

// ===== PLANEJAMENTO =====
function openPlan(){
  sheet(`<h2>Planejamento</h2>
    <div class="plan-highlight">
      <div style="font-size:11px;font-weight:700;color:var(--indigo);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">⭐ Valores iniciais</div>
      <button class="litem" style="width:100%;background:transparent;" onclick="closeModal();setTimeout(openSettings,100)">
        <div class="left"><div class="emoji" style="background:#C7D2FE;">⚙️</div><div><div class="name">Margem e estimativa de renda</div><div class="meta">Defina seus valores base aqui</div></div></div><span style="color:var(--indigo);font-size:18px;">›</span>
      </button>
    </div>
    <div class="card tight" style="margin-bottom:12px;">
      <button class="litem" style="width:100%;" onclick="closeModal();setTimeout(openBills,100)"><div class="left"><div class="emoji">🏠</div><div class="name">Contas fixas</div></div><span class="muted">›</span></button>
      <button class="litem" style="width:100%;" onclick="closeModal();setTimeout(openGoals,100)"><div class="left"><div class="emoji">🎯</div><div class="name">Metas e reservas</div></div><span class="muted">›</span></button>
      <button class="litem" style="width:100%;" onclick="closeModal();setTimeout(openDebts,100)"><div class="left"><div class="emoji">💳</div><div class="name">Dívidas</div></div><span class="muted">›</span></button>
      <button class="litem" style="width:100%;" onclick="closeModal();setTimeout(openReconcile,100)"><div class="left"><div class="emoji">🔄</div><div class="name">Ajustar saldo</div></div><span class="muted">›</span></button>
    </div>
    <div class="section-title">Dados</div>
    <div class="card tight">
      <button class="litem" style="width:100%;" onclick="exportData()"><div class="left"><div class="emoji">⬇️</div><div class="name">Exportar backup</div></div><span class="muted">›</span></button>
      <button class="litem" style="width:100%;" onclick="document.getElementById('importFile').click()"><div class="left"><div class="emoji">⬆️</div><div class="name">Importar backup</div></div><span class="muted">›</span></button>
      <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
    </div>`);
}

// ===== CONTAS FIXAS =====
function openBills(){
  const list=S.bills.length?S.bills.map(b=>`<div class="litem"><div class="left"><div class="emoji">📄</div><div><div class="name">${b.name}</div></div></div><div style="display:flex;align-items:center;gap:8px;"><span class="amt val">${fmt(b.amount)}</span><button class="icon-btn" style="width:32px;height:32px;padding:0;font-size:14px;" onclick="delBill('${b.id}')">🗑️</button></div></div>`).join('')
    :'<div class="empty"><span class="e">🏠</span>Nenhuma conta fixa</div>';
  sheet(`<h2>Contas fixas</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">O total é descontado do seu disponível todos os meses.</p>
    <div class="card tinted tight" style="margin-bottom:16px;">${list}</div>
    <div class="card"><div class="section-title" style="margin-top:0;">Adicionar conta</div>
      <div class="field"><label>Nome</label><input type="text" id="bName" placeholder="Ex: Aluguel, Internet, Academia"></div>
      <div class="field"><label>Valor mensal</label><input type="text" inputmode="decimal" id="bAmount" placeholder="R$ 0" oninput="maskMoney(this)"></div>
      <button class="btn" onclick="addBill()">Adicionar</button></div>`);
}
function addBill(){
  const name=document.getElementById('bName').value.trim();const amount=parseMoney(document.getElementById('bAmount').value);
  if(!name||amount<=0){alert('Preencha nome e valor');return;}
  S.bills.push({id:Date.now()+'',name,amount});save();openBills();
}
function delBill(id){S.bills=S.bills.filter(b=>b.id!==id);save();openBills();}

// ===== METAS =====
function openGoals(){
  const list=S.goals.length?S.goals.map(g=>{
    const pct=g.target>0?Math.min(100,(g.saved/g.target)*100):0;
    return`<div class="card tight" style="margin-bottom:8px;">
      <div class="row" style="margin-bottom:10px;"><div class="name" style="font-size:15px;font-weight:700;">${g.name}</div>
      <button class="icon-btn" style="width:32px;height:32px;padding:0;font-size:14px;" onclick="delGoal('${g.id}')">🗑️</button></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--indigo);"></div></div>
      <div class="bar-meta"><span>${fmt(g.saved)} de ${fmt(g.target)}</span><span>${fmt(g.monthly)}/mês</span></div>
      <button class="btn sm ghost" style="margin-top:10px;width:100%;" onclick="addToGoal('${g.id}')">+ Guardar agora</button></div>`;}).join('')
    :'<div class="empty"><span class="e">🎯</span>Nenhuma meta ainda</div>';
  sheet(`<h2>Metas e reservas</h2>
    <div class="insight" style="margin-bottom:12px;"><span class="ic">💡</span><span>O valor mensal de cada meta é descontado do seu disponível para gastar.</span></div>
    ${list}
    <div class="card" style="margin-top:4px;"><div class="section-title" style="margin-top:0;">Nova meta</div>
      <div class="field"><label>Nome</label><input type="text" id="gName" placeholder="Ex: Reserva de emergência"></div>
      <div class="field"><label>Valor alvo</label><input type="text" inputmode="decimal" id="gTarget" placeholder="R$ 0" oninput="maskMoney(this)"></div>
      <div class="field"><label>Guardar por mês</label><input type="text" inputmode="decimal" id="gMonthly" placeholder="R$ 0" oninput="maskMoney(this)"></div>
      <button class="btn" onclick="addGoal()">Criar meta</button></div>`);
}
function addGoal(){
  const name=document.getElementById('gName').value.trim();const target=parseMoney(document.getElementById('gTarget').value);const monthly=parseMoney(document.getElementById('gMonthly').value);
  if(!name||target<=0){alert('Preencha nome e valor alvo');return;}
  S.goals.push({id:Date.now()+'',name,target,monthly,saved:0});save();openGoals();
}
function addToGoal(id){
  const v=prompt('Quanto guardar agora?');const amount=parseMoney(v);if(amount<=0)return;
  const g=S.goals.find(x=>x.id===id);if(!g)return;
  g.saved+=amount;touchBalance(-amount);save();openGoals();
}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);save();openGoals();}

// ===== EXCLUIR GASTO =====
function delExpense(id){
  const e=S.expenses.find(x=>x.id===id);
  if(e&&!e.reconcile)touchBalance(e.amount);
  S.expenses=S.expenses.filter(x=>x.id!==id);
  save();renderExpenseList(curCatFilter);
}

// ===== SIMULADOR =====
let simMode='avista',simParc=2;
function setSimMode(m){
  simMode=m;
  document.getElementById('simAvista').classList.toggle('active',m==='avista');
  document.getElementById('simParc').classList.toggle('active',m==='parc');
  document.getElementById('simParcField').classList.toggle('hidden',m!=='parc');
  if(m==='parc')document.getElementById('simParcChips').innerHTML=[2,3,4,5,6,10,12].map(n=>`<button class="chip mini ${n===simParc?'active':''}" onclick="setSimParc(${n})">${n}x</button>`).join('');
}
function setSimParc(n){simParc=n;document.querySelectorAll('#simParcChips .chip').forEach(c=>c.classList.toggle('active',c.textContent===n+'x'));}
function runSim(){
  const val=parseMoney(document.getElementById('simValue').value);if(val<=0){alert('Digite um valor');return;}
  const avail=availableThisMonth();const box=document.getElementById('simResult');let html='';
  if(simMode==='avista'){
    const after=avail-val;let verdict,vclass;
    if(after>=S.safetyMargin){verdict='Seguro';vclass='safe';}else if(after>=0){verdict='Moderado';vclass='mod';}else{verdict='Arriscado';vclass='risk';}
    html=`<div class="verdict ${vclass}"><div class="lbl" style="color:inherit;opacity:.8;">Este gasto é</div><div class="big">${verdict}</div></div>
      <div class="card"><div class="simrow"><span>Disponível agora</span><span class="v">${fmt(avail)}</span></div>
      <div class="simrow"><span>Depois deste gasto</span><span class="v" style="color:${after<0?'var(--red)':'var(--green)'}">${fmt(after)}</span></div>
      <div class="simrow" style="border:none;"><span>Cabe no disponível?</span><span class="v">${val<=avail?'✅ Sim':'❌ Não'}</span></div></div>
      <div class="insight ${after<0?'danger':after<S.safetyMargin?'warn':''}"><span class="ic">💬</span><span>${after>=S.safetyMargin?`Tranquilo. Sobram ${fmt(after)} e sua margem fica intacta.`:after>=0?`Cabe, mas consome sua margem. Sobrariam ${fmt(after)}.`:`Esse gasto deixa você no negativo (${fmt(after)}). Considere parcelar ou adiar.`}</span></div>`;
  }else{
    const perInst=val/simParc;const projRows=[];let worstMonth=null;
    for(let i=0;i<simParc;i++){
      const d=new Date();d.setMonth(d.getMonth()+i);const monthName=d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
      const projAvail=i===0?avail-perInst:S.monthlyEstimate-billsTotal()-goalsMonthly()-S.safetyMargin-perInst;
      if(!worstMonth||projAvail<worstMonth.v)worstMonth={m:monthName,v:projAvail};
      projRows.push(`<div class="simrow"><span>${monthName} · parcela ${i+1}</span><span class="v" style="color:${projAvail<0?'var(--red)':'var(--ink)'}">${fmt(projAvail)} livre</span></div>`);
    }
    let verdict,vclass;
    if(worstMonth.v>=S.safetyMargin){verdict='Seguro';vclass='safe';}else if(worstMonth.v>=0){verdict='Moderado';vclass='mod';}else{verdict='Arriscado';vclass='risk';}
    html=`<div class="verdict ${vclass}"><div class="lbl" style="color:inherit;opacity:.8;">${simParc}x de ${fmt(perInst)} é</div><div class="big">${verdict}</div></div>
      <div class="card"><div style="font-size:13px;color:var(--muted);margin-bottom:8px;">Projeção mês a mês (estimativa):</div>${projRows.join('')}</div>
      <div class="insight ${vclass==='risk'?'danger':vclass==='mod'?'warn':''}"><span class="ic">💬</span><span>${vclass==='safe'?`${simParc}x de ${fmt(perInst)} cabe bem. No mês mais apertado sobram ${fmt(worstMonth.v)}.`:vclass==='mod'?`Dá pra fazer, mas em ${worstMonth.m} a folga fica pequena (${fmt(worstMonth.v)}).`:`Em ${worstMonth.m} essa parcela te deixaria negativo (${fmt(worstMonth.v)}). Tente menos parcelas.`}</span></div>
      <div class="insight"><span class="ic">📌</span><span>Projeções futuras usam sua estimativa de renda (${fmt(S.monthlyEstimate)}).</span></div>`;
  }
  box.innerHTML=html;setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

// ===== CONFIGURAÇÕES =====
function openSettings(){
  sheet(`<h2>Valores iniciais</h2>
    <div class="field"><label>Margem de segurança</label><input type="text" inputmode="decimal" id="setMargin" value="${fmtFull(S.safetyMargin)}" oninput="maskMoney(this)"></div>
    <div class="field"><label>Estimativa de renda mensal (para o simulador)</label><input type="text" inputmode="decimal" id="setEst" value="${fmtFull(S.monthlyEstimate)}" oninput="maskMoney(this)"></div>
    <button class="btn" onclick="saveSettings()">Salvar</button>
    <button class="btn danger" style="margin-top:10px;" onclick="if(confirm('Apagar TODOS os dados? Faça um backup primeiro.')){localStorage.removeItem('meudinheiro_v3');location.reload();}">Apagar todos os dados</button>`);
}
function saveSettings(){
  S.safetyMargin=parseMoney(document.getElementById('setMargin').value);
  S.monthlyEstimate=parseMoney(document.getElementById('setEst').value);
  closeModal();save();
}

// ===== EXPORT / IMPORT =====
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup-meudinheiro-'+todayISO()+'.json';a.click();
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=e=>{try{S={...blank(),...JSON.parse(e.target.result)};save();alert('Backup importado!');}catch(err){alert('Arquivo inválido');}};r.readAsText(f);
}

// ===== INIT =====
const h=new Date().getHours();
document.getElementById('greeting').textContent=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
render();
</script>
</body>
