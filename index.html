<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4F46E5">
<title>Meu Dinheiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --indigo:#4F46E5;--indigo-hover:#4338CA;--indigo-soft:#EEF2FF;
  --bg:#F8F9FC;--card:#FFFFFF;
  --ink:#0F172A;--muted:#64748B;--faint:#CBD5E1;--track:#E2E8F0;
  --green:#10B981;--amber:#F59E0B;--orange:#F97316;--red:#EF4444;--red-deep:#991B1B;
  --shadow:0 1px 4px rgba(0,0,0,0.06);--shadow-fab:0 4px 16px rgba(79,70,229,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}
body{padding-bottom:88px;max-width:760px;margin:0 auto;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;font-size:16px;}
.hidden{display:none!important;}

.topbar{padding:18px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.topbar h1{font-size:20px;font-weight:800;letter-spacing:-0.02em;}
.topbar .sub{font-size:13px;color:var(--muted);font-weight:500;}
.icon-btn{min-width:40px;height:40px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--indigo);padding:0 12px;gap:6px;}

.screen{padding:8px 16px 16px;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:12px;}
.card.tight{padding:16px;}
.card.tinted{background:#F1F5F9;}
.hero{background:linear-gradient(135deg,#4F46E5,#6366F1);border-radius:20px;padding:24px;color:#fff;margin-bottom:12px;box-shadow:0 8px 24px rgba(79,70,229,0.25);}
.hero .label{font-size:14px;font-weight:500;opacity:.9;}
.hero .big{font-size:44px;font-weight:800;letter-spacing:-0.03em;margin:4px 0 2px;line-height:1;}
.hero .sub{font-size:14px;opacity:.85;font-weight:500;}
.hero .divider{height:1px;background:rgba(255,255,255,.2);margin:16px 0;}
.hero-row{display:flex;justify-content:space-between;font-size:14px;}
.hero-row .v{font-weight:700;}

.row{display:flex;justify-content:space-between;align-items:center;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 4px 8px;}
.muted{color:var(--muted);}
.lbl{font-size:14px;color:var(--muted);font-weight:500;}
.val{font-size:20px;font-weight:700;letter-spacing:-0.01em;}
.val.green{color:var(--green);}.val.red{color:var(--red);}.val.amber{color:var(--amber);}.val.indigo{color:var(--indigo);}

.bar-wrap{margin-top:10px;}
.bar-track{height:10px;background:var(--track);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;border-radius:999px;transition:width .5s ease,background-color .4s ease;width:0;}
.bar-meta{display:flex;justify-content:space-between;font-size:13px;margin-top:8px;color:var(--muted);font-weight:500;}
.status-msg{font-size:14px;font-weight:600;margin-top:10px;}

.badge{display:inline-block;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:600;}
.badge.pend{background:#FEF3C7;color:#92400E;}
.badge.conf{background:#D1FAE5;color:#065F46;}

.litem{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #F1F5F9;}
.litem:last-child{border-bottom:none;}
.litem .left{display:flex;align-items:center;gap:12px;}
.litem .emoji{width:40px;height:40px;border-radius:12px;background:var(--indigo-soft);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.litem .name{font-size:15px;font-weight:600;}
.litem .meta{font-size:12px;color:var(--muted);margin-top:2px;}
.litem .amt{font-size:16px;font-weight:700;text-align:right;}
.litem.clickable{cursor:pointer;}
.litem.clickable:active{background:#F8F9FC;border-radius:12px;}

.btn{background:var(--indigo);color:#fff;border-radius:12px;padding:15px 24px;font-size:15px;font-weight:700;width:100%;transition:.15s;}
.btn:active{transform:scale(.98);}
.btn.ghost{background:var(--indigo-soft);color:var(--indigo);}
.btn.outline{background:transparent;border:1.5px solid var(--track);color:var(--ink);}
.btn.danger{background:#FEE2E2;color:var(--red-deep);}
.btn.sm{padding:10px 16px;font-size:14px;width:auto;}
.btn-row{display:flex;gap:8px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
.field input,.field select{width:100%;padding:14px;border:1.5px solid var(--track);border-radius:12px;background:var(--card);color:var(--ink);transition:.15s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--indigo);}
.big-input input{font-size:32px;font-weight:800;text-align:center;letter-spacing:-0.02em;padding:18px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{padding:9px 14px;border-radius:999px;background:var(--bg);border:1.5px solid var(--track);font-size:14px;font-weight:600;transition:.15s;}
.chip.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}
.chip.mini{padding:7px 12px;font-size:13px;}

.overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:ofade .2s;}
@keyframes ofade{from{opacity:0;}to{opacity:1;}}
.sheet{background:var(--bg);width:100%;max-width:760px;border-radius:24px 24px 0 0;padding:20px 16px calc(24px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:slideup .28s cubic-bezier(.2,.8,.2,1);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.sheet-handle{width:40px;height:4px;background:var(--faint);border-radius:999px;margin:0 auto 16px;cursor:pointer;}
.sheet h2{font-size:20px;font-weight:800;margin-bottom:16px;letter-spacing:-0.02em;}

.fab{position:fixed;bottom:84px;right:20px;background:var(--indigo);color:#fff;border-radius:999px;padding:15px 22px;font-size:15px;font-weight:700;box-shadow:var(--shadow-fab);z-index:40;display:flex;align-items:center;gap:8px;}
.fab .plus{font-size:20px;line-height:1;}
@keyframes pulse{0%,100%{box-shadow:var(--shadow-fab);}50%{box-shadow:0 4px 28px rgba(79,70,229,.7);}}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:760px;background:var(--card);box-shadow:0 -1px 8px rgba(0,0,0,.05);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:30;}
.nav button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;color:var(--faint);font-size:11px;font-weight:600;flex:1;}
.nav button .ni{font-size:22px;}
.nav button.active{color:var(--indigo);}

.insight{display:flex;gap:12px;padding:14px;border-radius:14px;background:var(--indigo-soft);margin-bottom:8px;font-size:14px;line-height:1.5;font-weight:500;}
.insight .ic{font-size:18px;flex-shrink:0;}
.insight.warn{background:#FFF7ED;}
.insight.danger{background:#FEF2F2;}

.verdict{text-align:center;padding:20px;border-radius:16px;margin-bottom:12px;}
.verdict .big{font-size:24px;font-weight:800;}
.verdict.safe{background:#D1FAE5;color:#065F46;}
.verdict.mod{background:#FEF3C7;color:#92400E;}
.verdict.risk{background:#FEE2E2;color:#991B1B;}
.simrow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F5F9;font-size:14px;}
.simrow .v{font-weight:700;}

.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:14px;}
.empty .e{font-size:36px;display:block;margin-bottom:8px;}
.alert-stale{background:#FFF7ED;border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;color:#92400E;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.comp-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #F1F5F9;}
.comp-row:last-child{border-bottom:none;}
.comp-row .left{display:flex;align-items:center;gap:12px;}
.comp-row .name{font-size:14px;font-weight:600;}
.comp-row .amt{font-size:15px;font-weight:700;}
/* Valores iniciais вҖ” card destacado no Planejamento */
.plan-highlight{background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid #C7D2FE;}
.plan-highlight .litem{border-bottom-color:#C7D2FE;}
.plan-highlight .litem:last-child{border-bottom:none;}

/* cats grid no dashboard */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.cat-card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;}
.cat-card:active{transform:scale(.97);}
.cat-card .ce{font-size:22px;margin-bottom:6px;}
.cat-card .cn{font-size:13px;font-weight:600;color:var(--muted);}
.cat-card .cv{font-size:18px;font-weight:800;color:var(--ink);}

.pending-tag{font-size:11px;color:var(--amber);font-weight:600;margin-left:6px;}

@media(min-width:520px){.cat-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:760px){.fab{right:calc(50% - 360px);}}
</style>
</head>
<body>

<div class="topbar">
  <div><h1 id="greeting">Meu Dinheiro</h1><div class="sub" id="todayDate"></div></div>
  <button class="icon-btn" onclick="openPlan()">рҹ“Ӣ Planejamento</button>
</div>

<!-- DASHBOARD -->
<div class="screen" id="screen-dash">
  <div id="staleWrap"></div>

  <div class="hero">
    <div class="label">VocГӘ pode gastar hoje</div>
    <div class="big" id="dailyAmount">R$ 0</div>
    <div class="sub" id="daysLeft"></div>
    <div class="divider"></div>
    <div class="hero-row"><span>DisponГӯvel atГ© o fim do mГӘs</span><span class="v" id="monthAvail">R$ 0</span></div>
  </div>

  <!-- BOX de composiГ§ГЈo do disponГӯvel -->
  <div class="card tight" id="compositionBox" style="margin-bottom:12px;"></div>

  <div class="card">
    <div class="row"><span class="lbl" id="goalTitle">Progresso da meta</span><span class="val" id="limitPct" style="font-size:16px;">0%</span></div>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill" id="limitBar"></div></div>
      <div class="bar-meta"><span id="limitSpent">R$ 0 guardado</span><span id="limitMax">de R$ 0</span></div>
    </div>
    <div class="status-msg" id="limitStatus"></div>
  </div>

  <div class="section-title">Resumo do mГӘs</div>
  <div class="card tight">
    <div class="litem"><div class="left"><div class="emoji">рҹ“Ҙ</div><div><div class="name">Recebido</div></div></div><div class="amt val green" id="sumIncome">R$ 0</div></div>
    <div class="litem"><div class="left"><div class="emoji">рҹ“Ө</div><div><div class="name">Gasto</div></div></div><div class="amt val red" id="sumExpense">R$ 0</div></div>
    <div class="litem clickable" onclick="openBills()"><div class="left"><div class="emoji">рҹҸ </div><div><div class="name">Contas fixas do mГӘs</div></div></div><div style="display:flex;align-items:center;gap:6px;"><div class="amt val" id="sumBills">R$ 0</div><span class="muted">вҖә</span></div></div>
  </div>

  <div class="section-title">Gastos por categoria</div>
  <div class="cat-grid" id="catGrid"></div>

  <div class="section-title">Insights</div>
  <div id="insights"></div>

  <div style="height:8px;"></div>
</div>

<!-- ENTRADAS -->
<div class="screen hidden" id="screen-income">
  <div class="btn-row" style="margin-bottom:12px;">
    <button class="btn" onclick="openIncome('now')">+ Recebi agora</button>
    <button class="btn ghost" onclick="openIncome('pending')">A receber</button>
  </div>
  <div class="section-title">HistГіrico</div>
  <div class="card tight" id="incomeList"></div>
</div>

<!-- SIMULADOR -->
<div class="screen hidden" id="screen-sim">
  <div class="card">
    <div class="field big-input">
      <label>Quanto vocГӘ quer gastar?</label>
      <input type="text" inputmode="decimal" id="simValue" placeholder="R$ 0" oninput="maskMoney(this)">
    </div>
    <div class="field">
      <label>Como pretende pagar?</label>
      <div class="chips">
        <button class="chip active" id="simAvista" onclick="setSimMode('avista')">ГҖ vista</button>
        <button class="chip" id="simParc" onclick="setSimMode('parc')">Parcelado</button>
      </div>
    </div>
    <div class="field hidden" id="simParcField">
      <label>Em quantas vezes?</label>
      <div class="chips" id="simParcChips"></div>
    </div>
    <button class="btn" onclick="runSim()">Simular</button>
  </div>
  <div id="simResult"></div>
</div>

<!-- GASTOS (lista) -->
<div class="screen hidden" id="screen-expenses">
  <div id="expenseListWrap"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openQuick()"><span class="plus">+</span> Gasto rГЎpido</button>

<!-- NAV -->
<div class="nav">
  <button class="active" id="nav-dash" onclick="nav('dash')"><span class="ni">рҹҸ </span>InГӯcio</button>
  <button id="nav-income" onclick="nav('income')"><span class="ni">рҹ“Ҙ</span>Entradas</button>
  <button id="nav-sim" onclick="nav('sim')"><span class="ni">рҹ§®</span>Simular</button>
  <button id="nav-expenses" onclick="nav('expenses')"><span class="ni">рҹ“Ӣ</span>Gastos</button>
</div>

<div id="modalRoot"></div>

<script>
const DEFAULT_CATS=[
  {id:'alim',n:'AlimentaГ§ГЈo',e:'рҹҚҪпёҸ'},{id:'mora',n:'Moradia',e:'рҹҸ '},{id:'transp',n:'Transporte',e:'рҹҡ—'},
  {id:'saude',n:'SaГәde',e:'рҹ’Ҡ'},{id:'lazer',n:'Lazer',e:'рҹҺү'},{id:'estudo',n:'Estudos',e:'рҹ“ҡ'},
  {id:'compras',n:'Compras',e:'рҹӣҚпёҸ'},{id:'assin',n:'Assinaturas',e:'рҹ“ә'},{id:'outros',n:'Outros',e:'рҹ’ё'}
];
function allCats(){return [...DEFAULT_CATS,...(S.customCats||[])];}

function blank(){return{
  balance:0,balanceUpdatedAt:null,
  monthLimit:3000,safetyMargin:300,monthlyEstimate:4000,
  expenses:[],incomes:[],bills:[],goals:[],
  customCats:[],
  lastCats:[]
};}
let S=load();

function load(){try{const r=localStorage.getItem('meudinheiro_v3');return r?{...blank(),...JSON.parse(r)}:blank();}catch(e){return blank();}}
function save(){localStorage.setItem('meudinheiro_v3',JSON.stringify(S));render();}

function fmt(v){return'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:2});}
function fmtFull(v){return'R$ '+(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseMoney(s){if(!s)return 0;return parseFloat(String(s).replace(/[^\d,]/g,'').replace(',','.'))||0;}
function maskMoney(el){let v=el.value.replace(/\D/g,'');v=(parseInt(v)/100||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});el.value=v?'R$ '+v:'';}
function todayISO(){return new Date().toISOString().slice(0,10);}
function curMonth(){return new Date().toISOString().slice(0,7);}
function daysLeftInMonth(){const n=new Date();const last=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();return last-n.getDate()+1;}
function daysSince(iso){if(!iso)return 999;return Math.floor((Date.now()-new Date(iso).getTime())/864e5);}
function catById(id){return allCats().find(c=>c.id===id)||{n:'Outros',e:'рҹ’ё'};}
function vibrate(ms){if(navigator.vibrate)navigator.vibrate(ms);}

// ===== CГҒLCULO =====

function monthExpenses(){
  return S.expenses.filter(e=>e.date.slice(0,7)===curMonth()&&!e.reconcile);
}
function monthExpenseTotal(){
  // todos os gastos do mГӘs (crГ©dito entra como gasto do mГӘs, sem distinГ§ГЈo de fatura)
  return monthExpenses().reduce((a,e)=>a+e.amount,0);
}
function billsTotal(){
  // PONTO 9+11: total COMPLETO das contas fixas, independente de data
  return S.bills.reduce((a,b)=>a+b.amount,0);
}
function goalsMonthly(){return S.goals.reduce((a,g)=>a+(g.monthly||0),0);}

// PONTO 13: entradas confirmadas + pendentes entram no cГЎlculo
function pendingIncomesTotal(){
  return S.incomes.filter(i=>i.status==='pending'&&i.date.slice(0,7)===curMonth()).reduce((a,i)=>a+i.amount,0);
}
function confirmedIncomesTotal(){
  return S.incomes.filter(i=>i.status==='confirmed'&&i.date.slice(0,7)===curMonth()).reduce((a,i)=>a+i.amount,0);
}

// FГ“RMULA CENTRAL
// disponГӯvel = saldo atual + entradas previstas do mГӘs - contas fixas totais - metas - margem
function availableThisMonth(){
  return S.balance + pendingIncomesTotal() - billsTotal() - goalsMonthly() - S.safetyMargin;
}
function dailyAvailable(){
  return Math.max(0,availableThisMonth())/Math.max(1,daysLeftInMonth());
}

// ===== RENDER =====

function render(){
  document.getElementById('todayDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});

  // hero
  document.getElementById('dailyAmount').textContent=fmt(dailyAvailable());
  document.getElementById('daysLeft').textContent=daysLeftInMonth()+' dias atГ© o fim do mГӘs';
  document.getElementById('monthAvail').textContent=fmt(availableThisMonth());

  // box de composiГ§ГЈo
  const pend=pendingIncomesTotal();
  const cb=document.getElementById('compositionBox');
  const rows=[];

  rows.push(`<div class="comp-row"><div class="left"><div class="emoji" style="background:#EEF2FF;">рҹҸҰ</div><div><div class="name">Saldo atual</div></div></div><div class="amt val indigo" id="curBalance">${fmt(S.balance)}</div></div>`);

  if(pend>0){
    rows.push(`<div class="comp-row"><div class="left"><div class="emoji" style="background:#FEF3C7;">вҸі</div><div><div class="name">A receber <span style="font-size:11px;color:var(--amber);font-weight:600;">estimado</span></div></div></div><div class="amt val amber">+ ${fmt(pend)}</div></div>`);
  }
  if(S.bills.length>0){
    rows.push(`<div class="comp-row"><div class="left"><div class="emoji" style="background:#FEE2E2;">рҹҸ </div><div><div class="name">Contas fixas</div></div></div><div class="amt val red">вҲ’ ${fmt(billsTotal())}</div></div>`);
  }
  if(S.safetyMargin>0){
    rows.push(`<div class="comp-row"><div class="left"><div class="emoji" style="background:#F1F5F9;">рҹӣЎпёҸ</div><div><div class="name">Reserva de seguranГ§a</div></div></div><div class="amt val muted">вҲ’ ${fmt(S.safetyMargin)}</div></div>`);
  }


  cb.innerHTML=rows.join('');

  // stale alert
  const sw=document.getElementById('staleWrap');
  const ds=daysSince(S.balanceUpdatedAt);
  if(!S.balanceUpdatedAt){
    sw.innerHTML=`<div class="alert-stale"><span>рҹ‘Ӣ Informe seu saldo para comeГ§ar</span><button class="btn sm" onclick="openReconcile()">Informar</button></div>`;
  }else if(ds>=4){
    sw.innerHTML=`<div class="alert-stale"><span>вҡ пёҸ Saldo de ${ds} dias atrГЎs</span><button class="btn sm ghost" onclick="openReconcile()">Ajustar</button></div>`;
  }else sw.innerHTML='';

  // barra de progresso da meta
  const goal=(S.goals&&S.goals.length>0)?S.goals[0]:null;
  const bar=document.getElementById('limitBar');
  const sm=document.getElementById('limitStatus');
  if(goal){
    const pct=goal.target>0?Math.min(100,(goal.saved/goal.target)*100):0;
    document.getElementById('goalTitle').textContent='рҹ”Ҙ '+goal.name;
    document.getElementById('limitPct').textContent=Math.round(pct)+'%';
    document.getElementById('limitSpent').textContent=fmt(goal.saved)+' guardado';
    document.getElementById('limitMax').textContent='de '+fmt(goal.target);
    bar.style.width=pct+'%';
    bar.style.background='var(--indigo)';
    const falta=Math.max(0,goal.target-goal.saved);
    if(pct>=100){sm.textContent='рҹҺү Meta alcanГ§ada! ParabГ©ns.';sm.style.color='var(--green)';}
    else if(goal.monthly>0){
      const meses=Math.ceil(falta/goal.monthly);
      sm.textContent=`Faltam ${fmt(falta)} В· cerca de ${meses} ${meses===1?'mГӘs':'meses'} no ritmo atual`;
      sm.style.color='var(--muted)';
    }else{
      sm.textContent=`Faltam ${fmt(falta)} para alcanГ§ar a meta`;
      sm.style.color='var(--muted)';
    }
  }else{
    document.getElementById('goalTitle').textContent='Progresso da meta';
    document.getElementById('limitPct').textContent='вҖ”';
    document.getElementById('limitSpent').textContent='Nenhuma meta definida';

function renderCatGrid(){
  const exps=monthExpenses();
  const byCat={};
  exps.forEach(e=>byCat[e.cat]=(byCat[e.cat]||0)+e.amount);
  const used=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const grid=document.getElementById('catGrid');
  if(used.length===0){
    grid.innerHTML=`<div class="card" style="grid-column:1/-1;"><div class="empty" style="padding:16px;"><span class="e">рҹ“Ҡ</span>Nenhum gasto este mГӘs ainda</div></div>`;
    return;
  }
  grid.innerHTML=used.map(([id,val])=>{
    const cat=catById(id);
    return `<div class="cat-card" onclick="openCatDetail('${id}')">
      <div class="ce">${cat.e}</div>
      <div class="cn">${cat.n}</div>
      <div class="cv">${fmt(val)}</div>
    </div>`;
  }).join('');
}

function renderInsights(){
  const box=document.getElementById('insights');const out=[];
  const daily=dailyAvailable();
  const spent=monthExpenseTotal();
  const daysPassed=new Date().getDate();
  const pace=daysPassed>0?spent/daysPassed:0;
  const pend=pendingIncomesTotal();

  if(availableThisMonth()<0){
    out.push({c:'danger',i:'рҹҡЁ',t:'Seus compromissos do mГӘs jГЎ passam do seu saldo disponГӯvel. Cuidado com novos gastos.'});
  }
  if(pace>daily&&daily>0&&spent>0){
    const days=Math.ceil(Math.max(0,availableThisMonth())/Math.max(1,pace));
    out.push({c:'warn',i:'рҹ“Ҳ',t:`Seu ritmo de gasto estГЎ acima do ideal. Nesse ritmo, o orГ§amento pode apertar em ${days} dias.`});
  }
  if(pend>0){
    out.push({c:'',i:'рҹ’Ў',t:`${fmt(pend)} a receber jГЎ estГЎ incluГӯdo no seu disponГӯvel. Confirme quando cair para manter o saldo exato.`});
  }
  if(daysSince(S.balanceUpdatedAt)>=4&&S.balanceUpdatedAt){
    out.push({c:'warn',i:'рҹ”„',t:'Faz alguns dias que o saldo nГЈo Г© atualizado. Ajuste para manter os nГәmeros precisos.'});
  }
  if(daily>0&&daily<50){
    out.push({c:'warn',i:'рҹӨҸ',t:'Seu espaГ§o para gastar hoje estГЎ pequeno. Vale adiar gastos nГЈo essenciais.'});
  }
  const exps=monthExpenses();
  if(exps.length>0){
    const byCat={};exps.forEach(e=>byCat[e.cat]=(byCat[e.cat]||0)+e.amount);
    const top=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
    out.push({c:'',i:catById(top[0]).e,t:`Maior gasto do mГӘs: ${catById(top[0]).n} com ${fmt(top[1])}.`});
  }
  if(out.length===0)out.push({c:'',i:'рҹ‘Қ',t:'Tudo tranquilo. Continue registrando seus gastos para ter um panorama completo.'});
  box.innerHTML=out.map(o=>`<div class="insight ${o.c}"><span class="ic">${o.i}</span><span>${o.t}</span></div>`).join('');
}

function renderIncomeList(){
  const box=document.getElementById('incomeList');

  if(!list.length){box.innerHTML='<div class="empty"><span class="e">рҹ“Ҙ</span>Nenhuma entrada ainda</div>';return;}

let modalOpen=false;
function closeModal(){
  const root=document.getElementById('modalRoot');
  if(!root.innerHTML)return;
  root.innerHTML='';
  if(modalOpen){
    modalOpen=false;
    if(history.state&&history.state.modal){history.back();}
  }
}
function sheet(html){
  document.getElementById('modalRoot').innerHTML=
    `<div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <div class="sheet-handle" onclick="closeModal()"></div>
        ${html}
      </div>
    </div>`;
  if(!modalOpen){
    modalOpen=true;
    history.pushState({modal:true},'');
  }
}
window.addEventListener('popstate',()=>{
  if(modalOpen){
    modalOpen=false;
    document.getElementById('modalRoot').innerHTML='';

});

      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--indigo);"></div></div>
      <div class="bar-meta"><span>${fmt(g.saved)} de ${fmt(g.target)}</span><span>${fmt(g.monthly)}/mГӘs reservado</span></div>
      <button class="btn sm ghost" style="margin-top:10px;width:100%;" onclick="addToGoal('${g.id}')">+ Guardar agora</button>
    </div>`;}).join('')
    :'<div class="empty"><span class="e">рҹҺҜ</span>Nenhuma meta ainda</div>';

  sheet(`
    <h2>Metas e reservas</h2>
    <div class="insight" style="margin-bottom:12px;"><span class="ic">рҹ’Ў</span><span>O valor mensal de cada meta Г© descontado do seu disponГӯvel para gastar.</span></div>
    ${list}
    <div class="card" style="margin-top:4px;">
      <div class="section-title" style="margin-top:0;">Nova meta</div>
      <div class="field"><label>Nome</label><input type="text" id="gName" placeholder="Ex: Reserva de emergГӘncia"></div>
      <div class="field"><label>Valor alvo</label><input type="text" inputmode="decimal" id="gTarget" placeholder="R$ 0" oninput="maskMoney(this)"></div>
      <div class="field"><label>Guardar por mГӘs</label><input type="text" inputmode="decimal" id="gMonthly" placeholder="R$ 0" oninput="maskMoney(this)"></div>
      <button class="btn" onclick="addGoal()">Criar meta</button>
    </div>
  `);
}
function addGoal(){
  const name=document.getElementById('gName').value.trim();
  const target=parseMoney(document.getElementById('gTarget').value);
  const monthly=parseMoney(document.getElementById('gMonthly').value);
  if(!name||target<=0){alert('Preencha nome e valor alvo');return;}
  S.goals.push({id:Date.now()+'',name,target,monthly,saved:0});
  save();openGoals();
}
function addToGoal(id){
  const v=prompt('Quanto guardar agora?');
  const amount=parseMoney(v);if(amount<=0)return;
  const g=S.goals.find(x=>x.id===id);
  if(!g)return;
  g.saved+=amount;S.balance-=amount;
  save();openGoals();
}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);save();openGoals();}

// ===== DETALHE DE CATEGORIA =====
function openCatDetail(catId){
  curCatFilter=catId;
  nav('expenses');
}

// ===== EXCLUIR GASTO =====
function delExpense(id){
  S.expenses=S.expenses.filter(x=>x.id!==id);
  save();
  renderExpenseList(curCatFilter);
}

// ===== SIMULADOR =====
let simMode='avista',simParc=2;
function setSimMode(m){
  simMode=m;
  document.getElementById('simAvista').classList.toggle('active',m==='avista');
  document.getElementById('simParc').classList.toggle('active',m==='parc');
  document.getElementById('simParcField').classList.toggle('hidden',m!=='parc');
  if(m==='parc'){
    document.getElementById('simParcChips').innerHTML=[2,3,4,5,6,10,12].map(n=>
      `<button class="chip mini ${n===simParc?'active':''}" onclick="setSimParc(${n})">${n}x</button>`).join('');
  }
}
function setSimParc(n){
  simParc=n;
  document.querySelectorAll('#simParcChips .chip').forEach(c=>c.classList.toggle('active',c.textContent===n+'x'));
}
function runSim(){
  const val=parseMoney(document.getElementById('simValue').value);
  if(val<=0){alert('Digite um valor');return;}
  const avail=availableThisMonth();
  const box=document.getElementById('simResult');
  let html='';
  if(simMode==='avista'){
    const after=avail-val;
    let verdict,vclass;
    if(after>=S.safetyMargin){verdict='Seguro';vclass='safe';}
    else if(after>=0){verdict='Moderado';vclass='mod';}
    else{verdict='Arriscado';vclass='risk';}
    html=`<div class="verdict ${vclass}"><div class="lbl" style="color:inherit;opacity:.8;">Este gasto Г©</div><div class="big">${verdict}</div></div>
      <div class="card">
        <div class="simrow"><span>DisponГӯvel agora</span><span class="v">${fmt(avail)}</span></div>
        <div class="simrow"><span>Depois deste gasto</span><span class="v" style="color:${after<0?'var(--red)':'var(--green)'}">${fmt(after)}</span></div>
        <div class="simrow" style="border:none;"><span>Cabe no disponГӯvel?</span><span class="v">${val<=avail?'вң… Sim':'вқҢ NГЈo'}</span></div>
      </div>
      <div class="insight ${after<0?'danger':after<S.safetyMargin?'warn':''}"><span class="ic">рҹ’¬</span><span>${
        after>=S.safetyMargin?`Tranquilo. Sobram ${fmt(after)} e sua margem de seguranГ§a fica intacta.`:
        after>=0?`Cabe, mas consome sua margem de seguranГ§a. Sobrariam ${fmt(after)}.`:
        `Esse gasto deixa vocГӘ no negativo (${fmt(after)}). Considere parcelar ou adiar.`}</span></div>`;
  }else{
    const perInst=val/simParc;
    const projRows=[];let worstMonth=null;
    for(let i=0;i<simParc;i++){
      const d=new Date();d.setMonth(d.getMonth()+i);
      const monthName=d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
      const projAvail=i===0
        ?avail-perInst
        :S.monthlyEstimate-billsTotal()-goalsMonthly()-S.safetyMargin-perInst;
      if(!worstMonth||projAvail<worstMonth.v)worstMonth={m:monthName,v:projAvail};
      projRows.push(`<div class="simrow"><span>${monthName} В· parcela ${i+1}</span><span class="v" style="color:${projAvail<0?'var(--red)':'var(--ink)'}">${fmt(projAvail)} livre</span></div>`);
    }
    let verdict,vclass;
    if(worstMonth.v>=S.safetyMargin){verdict='Seguro';vclass='safe';}
    else if(worstMonth.v>=0){verdict='Moderado';vclass='mod';}
    else{verdict='Arriscado';vclass='risk';}
    html=`<div class="verdict ${vclass}"><div class="lbl" style="color:inherit;opacity:.8;">${simParc}x de ${fmt(perInst)} Г©</div><div class="big">${verdict}</div></div>
      <div class="card"><div style="font-size:13px;color:var(--muted);margin-bottom:8px;">ProjeГ§ГЈo mГӘs a mГӘs (estimativa):</div>${projRows.join('')}</div>
      <div class="insight ${vclass==='risk'?'danger':vclass==='mod'?'warn':''}"><span class="ic">рҹ’¬</span><span>${
        vclass==='safe'?`${simParc}x de ${fmt(perInst)} cabe bem. Mesmo no mГӘs mais apertado sobram ${fmt(worstMonth.v)}.`:
        vclass==='mod'?`DГЎ pra fazer, mas em ${worstMonth.m} a folga fica pequena (${fmt(worstMonth.v)}).`:
        `Em ${worstMonth.m} essa parcela te deixaria negativo (${fmt(worstMonth.v)}). Tente menos parcelas ou adie.`}</span></div>
      <div class="insight"><span class="ic">рҹ“Ң</span><span>Meses futuros usam sua estimativa de renda (${fmt(S.monthlyEstimate)}). Ajuste em Planejamento вҶ’ ConfiguraГ§Гөes.</span></div>`;
  }
  box.innerHTML=html;
  setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

// ===== CONFIGURAГҮГ•ES =====
function openSettings(){
  sheet(`
    <h2>ConfiguraГ§Гөes</h2>
    <div class="field"><label>Margem de seguranГ§a (mГӯnimo para terminar o mГӘs)</label><input type="text" inputmode="decimal" id="setMargin" value="${fmtFull(S.safetyMargin)}" oninput="maskMoney(this)"></div>
    <div class="field"><label>Estimativa de renda mensal (para o simulador)</label><input type="text" inputmode="decimal" id="setEst" value="${fmtFull(S.monthlyEstimate)}" oninput="maskMoney(this)"></div>
    <button class="btn" onclick="saveSettings()">Salvar</button>
    <button class="btn danger" style="margin-top:10px;" onclick="if(confirm('Apagar TODOS os dados? FaГ§a um backup primeiro.')){localStorage.removeItem('meudinheiro_v3');location.reload();}">Apagar todos os dados</button>
  `);
}
function saveSettings(){
  S.safetyMargin=parseMoney(document.getElementById('setMargin').value);
  S.monthlyEstimate=parseMoney(document.getElementById('setEst').value);
  closeModal();save();
}

// ===== EXPORT / IMPORT =====
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='backup-meudinheiro-'+todayISO()+'.json';a.click();
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{S={...blank(),...JSON.parse(e.target.result)};save();alert('Backup importado com sucesso!');}
    catch(err){alert('Arquivo invГЎlido');}
  };
  r.readAsText(f);
}

const h=new Date().getHours();
document.getElementById('greeting').textContent=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
render();
</script>
